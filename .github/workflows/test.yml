# 每次 push 或 PR 时，在 GitHub 提供的 Ubuntu 机器上自动跑测试。
# 通过的话，仓库主页会显示绿色的 ✅ 徽章。
name: 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 跑单元测试
        run: python3 -m unittest test_organize.py -v
